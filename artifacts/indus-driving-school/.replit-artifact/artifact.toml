kind = "web"
previewPath = "/"
title = "Indus Driving School"
version = "1.0.0"
id = "artifacts/indus-driving-school"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21816
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/indus-driving-school run dev"

[services.env]
PORT = "21816"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/indus-driving-school", "run", "build"]
publicDir = "artifacts/indus-driving-school/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
