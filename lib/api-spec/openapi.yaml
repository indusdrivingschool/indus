openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Indus Driving School API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bookings
    description: Booking operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /bookings:
    get:
      operationId: getBookings
      tags: [bookings]
      summary: Get all bookings
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
  /book:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "409":
          description: Time slot already booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /book/{id}:
    delete:
      operationId: cancelBooking
      tags: [bookings]
      summary: Cancel a booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Booking:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        time:
          type: string
        package:
          type: string
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        price:
          type: string
        createdAt:
          type: string
      required:
        - id
        - date
        - time
        - package
        - name
        - phone
        - email
        - createdAt
    CreateBookingRequest:
      type: object
      properties:
        date:
          type: string
        time:
          type: string
        package:
          type: string
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        price:
          type: string
      required:
        - date
        - time
        - package
        - name
        - phone
        - email
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
